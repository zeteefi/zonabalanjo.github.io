<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZoNaBalanjo — Trending</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;max-width:900px;margin:2rem auto;padding:0 1rem}
    .product{border-bottom:1px solid #eee;padding:0.8rem 0;display:flex;gap:1rem;align-items:center}
    .title{font-weight:600}
    .price{color:#b12704;font-weight:700}
    .meta{color:#666;font-size:0.9rem}
  </style>
</head>
<body>
  <h1>ZoNaBalanjo — Produk Trending</h1>
  <div id="generated"></div>
  <div id="list"></div>
<script>
async function load(){
  try{
    const res = await fetch('./data/data_produk.json');
    if(!res.ok){ document.getElementById('list').innerText='Data belum tersedia.'; return; }
    const jd = await res.json();
    document.getElementById('generated').innerText = 'Generated: ' + (jd.generated_at || '');
    const list = jd.products || [];
    const container = document.getElementById('list');
    if(!list.length){ container.innerText = 'Tidak ada produk.'; return; }
    list.slice(0,50).forEach(p=>{
      const el = document.createElement('div'); el.className='product';
      const priceText = p.price ? ('Rp ' + Number(p.price).toLocaleString()) : '-';
      el.innerHTML = `<div style="flex:1"><div class="title"><a href="${p.affiliate_url || p.url}" target="_blank" rel="noopener noreferrer">${p.title || '(no title)'}</a></div><div class="meta">${p.marketplace} • ${p.category || ''}</div></div><div><div class="price">${priceText}</div></div>`;
      container.appendChild(el);
    });
  }catch(e){ document.getElementById('list').innerText='Error loading data.' }
}
load();
</script>
</body>
</html>
